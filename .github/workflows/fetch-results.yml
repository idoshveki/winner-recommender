name: Fetch Match Results (Tue + Fri)

on:
  schedule:
    - cron: '0 4 * * 2,5'   # 6am Israel (UTC+2), Tuesday + Friday
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -q pandas requests python-dotenv

      - name: Fetch match results
        run: python src/data/fetch_football_data.py

      - name: Commit updated DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/db/winner.db data/raw/
          git diff --staged --quiet || (git commit -m "data: refresh match results [skip ci]" && git push)
