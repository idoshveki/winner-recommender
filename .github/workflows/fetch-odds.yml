name: Fetch Odds (daily)

on:
  schedule:
    - cron: '0 5 * * *'   # 7am Israel (UTC+2)
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -q pandas requests python-dotenv

      - name: Fetch odds
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python src/data/fetch_odds.py

      - name: Commit updated DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/db/winner.db
          git diff --staged --quiet || (git commit -m "data: refresh odds [skip ci]" && git push)
